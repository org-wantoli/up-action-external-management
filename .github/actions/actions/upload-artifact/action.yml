name: "Upload Artifact"
description: "Upload a build artifact that can be used by subsequent workflow steps"
inputs:
  name:
    description: "Artifact name"
    required: true
  path:
    description: "A file, directory or wildcard pattern that describes what to upload"
    required: true
  if-no-files-found:
    description: "The desired behavior if no files are found using the provided path. Available Options: warn, error, ignore"
    default: warn
  retention-days:
    description: "Duration after which artifact will expire in days. 0 means using default repository retention."
    default: "0"
  compression-level:
    description: "The level of compression for Zlib to be applied to the artifact archive (0-9)"
    default: "6"
  overwrite:
    description: "If true, an artifact with a matching name will be deleted before a new one is uploaded"
    default: "false"
  include-hidden-files:
    description: "Whether to include hidden files in the provided path in the artifact"
    default: "false"

runs:
  using: composite
  steps:
    - name: Upload Artifact ${{ inputs.name }}
      uses: actions/upload-artifact@v4
      with:
        name:                 ${{ inputs.name }}
        path:                 ${{ inputs.path }}
        if-no-files-found:    ${{ inputs.if-no-files-found }}
        retention-days:       ${{ inputs.retention-days }}
        compression-level:    ${{ inputs.compression-level }}
        overwrite:            ${{ inputs.overwrite }}
        include-hidden-files: ${{ inputs.include-hidden-files }}
